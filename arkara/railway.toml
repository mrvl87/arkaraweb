[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "node ./dist/server/entry.mjs"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "arkara-web"

[services.variables]
PORT = "3000"
HOST = "0.0.0.0"
NODE_ENV = "production"
NPM_CONFIG_OMIT = "dev"
