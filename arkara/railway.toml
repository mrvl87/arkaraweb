[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.variables]
# Hapus PORT = "3000" agar Railway menyuntikkan $PORT secara dinamis
HOST = "0.0.0.0"
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "23"
NPM_CONFIG_OMIT = "dev"
